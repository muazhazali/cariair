# Development-only: PostgreSQL only, run Next.js locally with `pnpm dev`
# This is 10x faster than building in Docker for development

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cariair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cariair"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
